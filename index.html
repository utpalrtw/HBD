<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      margin-top: 5vh;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    h1 { font-size: 2.5em; }

    .slideshow {
      width: 320px;
      height: 320px;
      margin: 20px auto;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .slide {
      position: absolute;
      inset-inline-start: 20px;
      inset-block-start: 20px;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: margin-right 4s ease-in-out;
    }

    .slide.active { opacity: 1; }

    #message {
      font-size: 1.2em;
      margin: 20px;
      line-height: 1.6;
      min-height: 120px;
    }

    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      background: #ff6f91;
      color: white;
      cursor: pointer;
      margin: 10px;
    }

    #popup, #finalScreen {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      padding: 25px;
      border-radius: 20px;
      z-index: 5;
      font-size: 1.4em;
    }

    #finalScreen {
      font-size: 1.8em;
    }

    .heart {
      position: fixed;
      font-size: 24px;
      animation: floatUp 4s linear forwards;
      z-index: 10;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <h1>🎂 Happy Birthday Sweetie 🥰</h1>

  <div class="slideshow">
    <img src="img1.jpeg" class="slide active">
    <img src="img2.jpeg" class="slide">
    <img src="img3.jpeg" class="slide">
    <img src="img5.jpeg" class="slide">
    <img src="img6.jpeg" class="slide">
    <img src="img7.jpeg" class="slide">
    <img src="img8.jpeg" class="slide">
    <img src="img9.jpeg" class="slide">
    <img src="img4.jpg" class="slide" id="lastSlide">
  </div>

  <div id="message"></div>

  <button onclick="launchFireworks()">🎆🎆🎆</button>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- Heartbeat sound -->
  <audio id="heartbeat">
    <source src="heartbeat.mp3" type="audio/mpeg">
  </audio>
</div>

<div id="popup">
  ❤️ Will you always be mine? ❤️<br><br>
  <button onclick="loveBurst()">Yes 💖</button>
</div>

<div id="">
  ❤️ HAPPY BIRTHADAY BEBU ❤️
</div>

<script>
// Typewriter
const text = `Happy Birthday, my love ❤️\nOn your special day, I wish you endless happiness, a heart full of peace.\nand a life filled with all the love you truly deserve.\nI love you endlessly 🥰`;
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

// Slideshow
let slides = document.querySelectorAll('.slide');
let index = 0;
setInterval(() => {
  slides[index].classList.remove('active');
  index = (index + 1) % slides.length;
  slides[index].classList.add('active');

  if (slides[index].id === 'lastSlide') {
    setTimeout(() => {
      document.getElementById('popup').style.display = 'block';
      launchFireworks();
    }, 1500);
  }
}, 2500);

// Love burst + merged sound effects
function loveBurst() {
{

  document.getElementById('popup').style.display = 'none';

  const music = document.getElementById('bgMusic');
  const heartbeat = document.getElementById('heartbeat');

  // Vibrate (Android)
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 300]);
  }

  // Lower background music for effect
  if (music) {
    music.volume = 0.2;
  }

  // Play heartbeat synced
  if (heartbeat) {
    heartbeat.currentTime = 0;
    heartbeat.play().catch(()=>{});
  }

  // Hearts animation
  for (let i = 0; i < 30; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '💕';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.bottom = '0px';
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }

  // Fireworks burst at same time
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      launchFireworks();
    }, i * 300);
  }

  // Restore music + final screen
  setTimeout(() => {
    if (music) music.volume = 0.6;
    document.getElementById('finalScreen').style.display = 'block';
  }, 2500);
}

  // Heartbeat sound
  document.getElementById('heartbeat').play();

  // Hearts
  for (let i = 0; i < 30; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '💕';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.bottom = '0px';
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }

  // Final screen after delay
  setTimeout(() => {
    document.getElementById('finalScreen').style.display = 'block';
  }, 2000);
}

// Fireworks
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: x,
      y: y,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 5 + 2,
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;
    p.life--;

    ctx.fillStyle = 'white';
    ctx.fillRect(p.x, p.y, 2, 2);

    if (p.life <= 0) particles.splice(index, 1);
  });

  requestAnimationFrame(animate);
}
animate();

function launchFireworks() {
  createFirework(Math.random() * canvas.width, Math.random() * canvas.height / 2);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
// Auto play music after user interaction (important for Android)
document.body.addEventListener('click', () => {
  const music = document.getElementById('bgMusic');
  if (music.paused) {
    music.volume = 0.6; // soft romantic volume
    music.play().catch(()=>{});
  }
});

</script>

</body>
