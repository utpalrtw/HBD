<script>
// GET ELEMENTS (FIX)
const popup = document.getElementById('popup');
const finalScreen = document.getElementById('finalScreen');

// TYPEWRITER
const text = `Happy Birthday my love ❤️
You are my happiness, my peace, my everything.
I love you endlessly 🥰`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += 
    text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

// SLIDESHOW
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
  slides[index].classList.remove('active');
  index = (index + 1) % slides.length;
  slides[index].classList.add('active');

  if (slides[index].id === 'lastSlide') {
    setTimeout(() => {
      popup.style.display = 'block'; // ✅ FIXED
      launchFireworks();
    }, 1000);
  }
}, 2500);

// LOVE BURST
function loveBurst() {
  popup.style.display = 'none';

  let music = document.getElementById('bgMusic');
  let heartbeat = document.getElementById('heartbeat');

  if (navigator.vibrate) navigator.vibrate([200,100,200]);

  if (music) music.volume = 0.2;
  if (heartbeat) heartbeat.play().catch(()=>{});

  for (let i = 0; i < 30; i++) {
    let h = document.createElement('div');
    h.className = 'heart';
    h.innerText = '💕';
    h.style.left = Math.random()*window.innerWidth+'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }

  for (let i = 0; i < 5; i++) {
    setTimeout(launchFireworks, i*300);
  }

  setTimeout(()=>{
    if (music) music.volume = 0.6;
    finalScreen.style.display = 'block'; // ✅ FIXED
  },2000);
}

// FIREWORKS
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

function createFirework(x,y){
  for(let i=0;i<50;i++){
    particles.push({
      x,y,
      angle:Math.random()*6.28,
      speed:Math.random()*5+2,
      life:100
    });
  }
}

function animate(){
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;
    p.life--;

    ctx.fillStyle='white';
    ctx.fillRect(p.x,p.y,2,2);

    if(p.life<=0) particles.splice(i,1);
  }

  requestAnimationFrame(animate);
}
animate();

function launchFireworks(){
  createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);
}

// SPARKLE (TOUCH)
document.addEventListener('touchmove', (e)=>{
  let t = document.createElement('div');
  t.className='sparkle';
  t.innerText='✨';
  t.style.left=e.touches[0].clientX+'px';
  t.style.top=e.touches[0].clientY+'px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1000);
});

// MUSIC FIX
document.body.addEventListener('click', ()=>{
  let music=document.getElementById('bgMusic');
  if(music && music.paused) music.play().catch(()=>{});
});

// RESIZE
window.onresize=()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
};
</script>
